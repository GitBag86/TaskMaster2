version: '3.8'

services:
  # Nginx reverse proxy + SSL termination
  nginx:
    image: nginx:alpine
    container_name: taskmaster-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Flask backend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmaster-web
    expose:
      - "5000"
    volumes:
      - ./instance:/app/instance
      - ./logs:/app/logs
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      - FLASK_ENV=production
      - SOCKETIO_ASYNC_MODE=gthread
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL (opcjonalnie - dla produkcji)
