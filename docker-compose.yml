services:
  # Nginx reverse proxy + SSL termination
  nginx:
    image: nginx:alpine
    container_name: taskmaster-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Flask backend (Gunicorn + gthread)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmaster-web
    expose:
      - "5000"
    volumes:
      - ./instance:/app/instance
      - ./logs/app:/app/logs
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      - FLASK_ENV=production
      - SOCKETIO_ASYNC_MODE=gthread
      - LOG_DIR=/app/logs
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  app-network:
    driver: bridge
